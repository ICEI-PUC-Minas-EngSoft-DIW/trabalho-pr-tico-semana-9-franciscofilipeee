<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chico's commerce</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <input id="search" type="text" placeholder="Pesquise por produtos...">

    <select id="category">
        <option value="">Todas as categorias</option>
        <option value="eletronicos">Celulares</option>
        <option value="roupas">Notebooks</option>
        <option value="acessorios">Acessórios</option>
        <option value="wearables">Wearables</option>
        <option value="tablets">Tablets</option>
        <option value="cameras">Câmeras</option>
        <option value="videogames">Videogames</option>
    </select>

    <button id="btnRender" onclick="renderizar()">Renderizar</button>

    <div class="product-wrapper">
        <div id="product-list"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
